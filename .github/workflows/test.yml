name: tests

on:
  push:
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests with coverage
        run: |
          coverage run --rcfile=.coveragerc -m pytest
          coverage report --rcfile=.coveragerc

  frontend-unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Lint CSS
        run: npm run lint:css

      - name: Check DTO boundary
        run: npm run check:dto-boundary

      - name: Run frontend coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium webkit

      - name: Run e2e
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - backend-tests
      - frontend-unit
      - e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -eu

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_BRANCH="${{ github.ref_name }}"
            DEPLOY_SHA="${{ github.sha }}"

            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/root/Devil"
            fi

            echo "Deploy path: $DEPLOY_PATH"
            echo "Deploy branch: $DEPLOY_BRANCH"
            echo "Deploy commit: $DEPLOY_SHA"

            cd "$DEPLOY_PATH"

            if docker compose version >/dev/null 2>&1; then
              compose() {
                docker compose "$@"
              }
            elif command -v docker-compose >/dev/null 2>&1; then
              compose() {
                docker-compose "$@"
              }
            else
              echo "Docker Compose is not installed on the server"
              exit 1
            fi

            echo "Current server state before sync:"
            git branch --show-current || true
            git rev-parse HEAD || true
            git status --short || true

            echo "Fetching latest main from GitHub..."
            git fetch origin "$DEPLOY_SHA" --depth=1 || git fetch origin main --prune

            echo "Switching server repository to tested commit..."
            git checkout -B main "$DEPLOY_SHA"
            git reset --hard "$DEPLOY_SHA"

            CURRENT_SHA="$(git rev-parse HEAD)"
            echo "Current server commit after sync: $CURRENT_SHA"

            if [ "$CURRENT_SHA" != "$DEPLOY_SHA" ]; then
              echo "Server checkout is not on expected commit"
              echo "Expected: $DEPLOY_SHA"
              echo "Actual:   $CURRENT_SHA"
              exit 1
            fi

            echo "Repository synced. Verifying deployed files..."

            echo "PWD:"
            pwd

            echo "HEAD:"
            git rev-parse HEAD

            echo "Deploy script line endings check:"
            if grep -n "$(printf '\r')" deploy/observability/postgres/bootstrap.sh; then
              echo "CRLF detected in deploy/observability/postgres/bootstrap.sh"
              exit 1
            fi

            echo "bootstrap.sh first lines:"
            sed -n '1,8p' deploy/observability/postgres/bootstrap.sh

            echo "Removing previous one-shot postgres-bootstrap container..."
            compose \
              -f docker-compose.prod.yml \
              -f deploy/observability/compose.yml \
              rm -f postgres-bootstrap

            echo "Repository synced. Starting Docker rebuild..."

            compose \
              -f docker-compose.prod.yml \
              -f deploy/observability/compose.yml \
              up -d --build --remove-orphans

            compose \
              -f docker-compose.prod.yml \
              -f deploy/observability/compose.yml \
              ps
