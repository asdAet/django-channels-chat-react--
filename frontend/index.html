  <head>
    <script>
      const yandexMetrikaId = "108160241";
      const googleTagId = "G-CYFZ1JQNSR";

      const appendScript = (id, src) => {
        if (document.getElementById(id)) {
          return;
        }

        const script = document.createElement("script");
        script.id = id;
        script.async = true;
        script.src = src;
        document.head.appendChild(script);
      };

      if (yandexMetrikaId) {
        appendScript(
          "yandex-metrika",
          `https://mc.yandex.ru/metrika/tag.js?id=${encodeURIComponent(yandexMetrikaId)}`,
        );

        window.ym =
          window.ym ||
          ((...args) => {
            const ym = window.ym;
            ym.a = ym.a || [];
            ym.a.push(args);
            ym.l = ym.l || Date.now();
          });

        window.ym(Number(yandexMetrikaId), "init", {
          ssr: true,
          webvisor: true,
          clickmap: true,
          ecommerce: "dataLayer",
          referrer: document.referrer,
          url: window.location.href,
          accurateTrackBounce: true,
          trackLinks: true,
        });
      }

      if (googleTagId) {
        appendScript(
          "google-tag-manager",
          `https://www.googletagmanager.com/gtag/js?id=${encodeURIComponent(googleTagId)}`,
        );

        window.dataLayer = window.dataLayer || [];
        function gtag(...args) {
          window.dataLayer.push(args);
        }
        gtag("js", new Date());
        gtag("config", googleTagId);
      }
    </script>
