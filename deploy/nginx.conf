worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE};
    error_log /var/log/nginx/error.log warn;

    log_format structured escape=json
        'time="$time_iso8601" remote_addr="$remote_addr" '
        'host="$host" method="$request_method" uri="$request_uri" '
        'status=$status bytes_sent=$body_bytes_sent request_length=$request_length '
        'request_time=$request_time referer="$http_referer" '
        'user_agent="$http_user_agent" upstream_addr="$upstream_addr" '
        'upstream_status="$upstream_status" '
        'upstream_response_time="$upstream_response_time"';
    map $request_method $loggable_request {
        default 0;
        GET 1;
        POST 1;
        PUT 1;
        PATCH 1;
        DELETE 1;
        HEAD 1;
        OPTIONS 1;
    }
    access_log /var/log/nginx/access.log structured if=$loggable_request;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 8080;
        server_name _;

        access_log off;

        location = /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow fc00::/7;
            deny all;
        }
    }

    server {
        listen 80;
        server_name ${NGINX_SERVER_NAMES};

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name ${NGINX_SERVER_NAMES};

        ssl_certificate /var/lib/nginx/tls/active/fullchain.pem;
        ssl_certificate_key /var/lib/nginx/tls/active/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/grafana-locations.conf;

        location = /login {
            try_files /index.html =404;
        }

        location = /register {
            try_files /index.html =404;
        }

        location / {
            # Keep popup-based OAuth flows compatible with the SPA opener page.
            add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
            try_files $uri /index.html;
        }

        location ~* /\.env {
            return 404;
        }

        location = /metrics {
            return 404;
        }

        location = /metrics/ {
            return 404;
        }

        location = /nginx_status {
            return 404;
        }

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
        }

        location /admin/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location /static/ {
            alias /static/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            add_header Vary "Accept-Encoding" always;
        }

        location /media/ {
            return 404;
        }

        location /_protected_media/ {
            internal;
            alias /media/;
            access_log off;
            expires 5m;
            add_header Accept-Ranges "bytes" always;
            add_header Cache-Control "private, max-age=300" always;
            add_header Vary "Accept-Encoding" always;
        }
    }
}
