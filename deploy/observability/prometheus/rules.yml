      - alert: Api5xxSpike
        expr: sum(rate(devils_http_requests_total{route=~"/api/.*", status_class="5xx"}[5m])) / clamp_min(sum(rate(devils_http_requests_total{route=~"/api/.*"}[5m])), 0.1) > 0.05
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Повышена доля API-ошибок 5xx"
          description: "Более 5% API-запросов возвращают 5xx за последние 5 минут."

