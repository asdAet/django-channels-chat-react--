      - alert: PostgresUnavailable
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL недоступен"
          description: "postgres_exporter сообщает pg_up == 0 дольше 2 минут."

      - alert: PostgresDeadlocksDetected
        expr: increase(pg_stat_database_deadlocks[10m]) > 0
        for: 0m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "Обнаружены deadlock в PostgreSQL"
          description: "За последние 10 минут в PostgreSQL были зафиксированы deadlock."

