      - alert: BlackboxProbeFailed
        expr: probe_success{job="blackbox_https"} == 0
        for: 2m
        labels:
          severity: critical
          service: edge
        annotations:
          summary: "Проверка HTTPS не проходит"
          description: "Blackbox не может успешно проверить {{ $labels.instance }} дольше 2 минут."

