global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: "devils-resting-prod"

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: backend
    metrics_path: /metrics/
    static_configs:
      - targets:
          - backend:8000

  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: nginx_exporter
    static_configs:
      - targets:
          - nginx_exporter:9113

  - job_name: redis_exporter
    static_configs:
      - targets:
          - redis_exporter:9121

  - job_name: postgres_exporter
    static_configs:
      - targets:
          - postgres_exporter:9187

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: blackbox_https
    metrics_path: /probe
    params:
      module:
        - http_tls_2xx
    static_configs:
      - targets:
          - https://nginx/
          - https://nginx/api/health/live/
          - https://nginx/api/health/ready/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115
